name: Lint & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform init (no backend)
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform validate

  docker-build:
    name: Build app image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t app-ci-check -f app/Dockerfile app/

      - name: Smoke test the image starts
        run: |
          docker run -d --name app-ci-check -p 8080:8080 app-ci-check
          sleep 3
          curl -sf http://localhost:8080/health
          docker stop app-ci-check

  python-lint:
    name: Lint Flask app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: flake8 app/app.py --max-line-length=100
